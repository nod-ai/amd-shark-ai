# Test hipBLASLt with latest develop branch changes on gfx1250 hardware.
# Uses sparse checkout to clone only required components, builds with install.sh, and runs tests.

name: Test hipBLASLt Develop

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_hipblaslt:
    name: Build hipBLASLt # (${{ inputs.amdgpu_family || 'gfx1250' }})
    runs-on: linux-mi355-1gpu-ossci-nod-ai
    timeout-minutes: 240
    steps:
      - name: Checkout shark-ai
        uses: actions/checkout@08c6903cd8c0fde910a37f88322edcfb5dd907a8 # v5.0.0

      - name: Setup Python
        uses: actions/setup-python@e797f83bcb11b83ae66e0230d6156d7c80228e7c # v6.0.0
        with:
          python-version: '3.10'

      - name: Checkout TheRock workspace
        run: |
          python -m venv venv
          source venv/bin/activate

          # Install ROCm for headers only
          python -m pip install \
            --index-url https://d2awnip2yjpvqn.cloudfront.net/v2/gfx950-dcgpu/ \
            rocm[libraries,devel]

          pip install pyyaml

          sudo apt-get update
          sudo apt-get install -y \
            make pkg-config libnuma1 git libmsgpack-dev \
            gfortran python3-yaml libopenblas-dev \
            libzstd-dev libgtest-dev wget \
            build-essential binutils libmsgpack-cxx-dev libssl-dev

          # Get pip-installed ROCm path for headers
          export PIP_ROCM_PATH=$(python -m rocm_sdk path --root)

          # Use SYSTEM compiler from /opt/rocm, but add pip ROCm headers
          export CC=/opt/rocm/bin/amdclang
          export CXX=/opt/rocm/bin/amdclang++
          export PATH="/opt/rocm/bin:$PATH"
          export LD_LIBRARY_PATH="/opt/rocm/lib:$PIP_ROCM_PATH/lib:$LD_LIBRARY_PATH"
          export CMAKE_PREFIX_PATH="/opt/rocm:$PIP_ROCM_PATH:$CMAKE_PREFIX_PATH"
          export CPLUS_INCLUDE_PATH="$PIP_ROCM_PATH/include:$CPLUS_INCLUDE_PATH"
          export C_INCLUDE_PATH="$PIP_ROCM_PATH/include:$C_INCLUDE_PATH"

          # Tell CMake to use venv Python
          export Python3_EXECUTABLE=$(which python3)
          export Python_EXECUTABLE=$(which python3)

          which pip
          python --version

          git clone --no-checkout --filter=blob:none https://github.com/ROCm/rocm-libraries.git
          cd rocm-libraries
          git sparse-checkout init --cone
          git sparse-checkout set projects/hipblaslt shared/origami shared/rocroller shared/mxdatagenerator
          git checkout develop

          cd projects/hipblaslt
          pip install -r tensilelite/requirements.txt
          pip install cmake==3.31.10

          # build
          ./install.sh -c -a gfx950
          cd tensilelite
          invoke build-client
          pip install -r requirements-dev.txt -e .
          cd ..

          # test
          export PATH="$(pwd)/build/release/hipblaslt-install/bin/:$PATH"
          ./hipblaslt-test 2>&1 | tee hipblaslt_test.log
